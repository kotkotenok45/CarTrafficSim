<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Infinite Smart Traffic</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; font-family: sans-serif; }
        canvas { display: block; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: #eee; pointer-events: none; background: rgba(0,0,0,0.7); padding: 12px; border-radius: 10px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div id="ui"><b>Smart AI Traffic</b><br>Без светофоров. Обзор 270°.</div>
    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const GRID_SIZE = 400;
        const CAR_W = 20, CAR_L = 42;
        
        let width, height, scale = 0.8, camera = { x: 0, y: 0 };
        let cars = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function sRand(x, y) {
            const s = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
            return s - Math.floor(s);
        }

        class Car {
            constructor(c, r, lane) {
                this.c = c; this.r = r; this.lane = lane;
                this.color = `hsl(${sRand(c, r + lane) * 360}, 70%, 50%)`;
                this.speed = 2 + sRand(c, r) * 2;
                this.angle = [Math.PI/2, Math.PI, -Math.PI/2, 0][lane];
                this.braking = false;
                const off = 32;
                this.lx = [200-off, 400, 200+off, 0][lane];
                this.ly = [0, 200-off, 400, 200+off][lane];
            }

            getGX() { return this.c * GRID_SIZE + this.lx; }
            getGY() { return this.r * GRID_SIZE + this.ly; }

            update(all) {
                let dMin = Infinity;
                const gx = this.getGX(), gy = this.getGY();
                this.braking = false;

                all.forEach(o => {
                    if(o === this) return;
                    const dx = o.getGX() - gx, dy = o.getGY() - gy;
                    const d = Math.hypot(dx, dy);

                    if (d < 130) {
                        // Вычисляем угол до другой машины относительно нашего направления
                        const angleToOther = Math.atan2(dy, dx);
                        let diff = angleToOther - this.angle;
                        // Нормализация угла
                        while (diff < -Math.PI) diff += Math.PI * 2;
                        while (diff > Math.PI) diff -= Math.PI * 2;

                        // Зрение: видим всё, кроме сектора сзади (от -135 до +135 градусов)
                        // То есть игнорируем только то, что сзади в радиусе 90 градусов.
                        if (Math.abs(diff) < Math.PI * 0.75) {
                            // Если машина очень близко впереди или сбоку — тормозим
                            if (d < dMin) dMin = d;
                        }
                    }
                });

                // Логика поведения
                if (dMin < 65) {
                    this.braking = true;
                    this.speed = Math.max(0, this.speed - 0.4);
                } else if (dMin < 110) {
                    this.braking = true;
                    this.speed = Math.max(1, this.speed - 0.15);
                } else {
                    this.speed = Math.min(4, this.speed + 0.1);
                }

                // Движение
                this.lx += Math.cos(this.angle) * this.speed;
                this.ly += Math.sin(this.angle) * this.speed;

                // Бесконечный мир
                if(this.lx >= GRID_SIZE) { this.lx = 0; this.c++; }
                if(this.lx < 0) { this.lx = GRID_SIZE; this.c--; }
                if(this.ly >= GRID_SIZE) { this.ly = 0; this.r++; }
                if(this.ly < 0) { this.ly = GRID_SIZE; this.r--; }
            }

            draw() {
                const sx = (this.getGX() - camera.x) * scale;
                const sy = (this.getGY() - camera.y) * scale;
                if (sx < -100 || sx > width + 100 || sy < -100 || sy > height + 100) return;

                ctx.save();
                ctx.translate(sx, sy);
                ctx.rotate(this.angle);

                // Свет фар (сделаем пошире, раз они всё видят)
                const g = ctx.createLinearGradient(15*scale, 0, 90*scale, 0);
                g.addColorStop(0, 'rgba(255,255,200,0.2)'); g.addColorStop(1, 'transparent');
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.moveTo(10*scale, -10*scale); ctx.lineTo(90*scale, -40*scale);
                ctx.lineTo(90*scale, 40*scale); ctx.lineTo(10*scale, 10*scale);
                ctx.fill();

                // Корпус
                ctx.fillStyle = this.color;
                ctx.fillRect(-CAR_L/2*scale, -CAR_W/2*scale, CAR_L*scale, CAR_W*scale);
                
                // Стоп-сигналы
                if(this.braking) {
                    ctx.fillStyle = '#f00';
                    ctx.shadowBlur = 10 * scale; ctx.shadowColor = '#f00';
                    ctx.fillRect(-CAR_L/2*scale, -CAR_W/2*scale, 3*scale, CAR_W*scale);
                }
                ctx.restore();
            }
        }

        function loop() {
            ctx.fillStyle = '#070707';
            ctx.fillRect(0, 0, width, height);

            const sc = Math.floor(camera.x / GRID_SIZE) - 1;
            const ec = Math.ceil((camera.x + width/scale) / GRID_SIZE) + 1;
            const sr = Math.floor(camera.y / GRID_SIZE) - 1;
            const er = Math.ceil((camera.y + height/scale) / GRID_SIZE) + 1;

            // 1. Дороги
            ctx.fillStyle = '#111';
            for(let c=sc; c<=ec; c++) {
                for(let r=sr; r<=er; r++) {
                    const x = (c*GRID_SIZE-camera.x)*scale, y = (r*GRID_SIZE-camera.y)*scale, s = GRID_SIZE*scale;
                    const rw = s*0.36;
                    ctx.fillRect(x + (s-rw)/2, y, rw, s);
                    ctx.fillRect(x, y + (s-rw)/2, s, rw);
                    // Центр перекрестка
                    ctx.fillRect(x + (s-rw)/2, y + (s-rw)/2, rw, rw);
                }
            }

            // 2. Здания
            ctx.fillStyle = '#0a0a0a';
            for(let c=sc; c<=ec; c++) {
                for(let r=sr; r<=er; r++) {
                    const x = (c*GRID_SIZE-camera.x)*scale, y = (r*GRID_SIZE-camera.y)*scale, s = GRID_SIZE*scale;
                    if(sRand(c, r) > 0.4) {
                        ctx.fillRect(x+20*scale, y+20*scale, s*0.2, s*0.2);
                        ctx.fillRect(x+s*0.75, y+s*0.75, s*0.2, s*0.2);
                    }
                    // Спавн только за кадром
                    const vis = c >= sc+1 && c < ec && r >= sr+1 && r < er;
                    if(!vis && Math.random() < 0.008 && cars.length < 100) cars.push(new Car(c, r, Math.floor(Math.random()*4)));
                }
            }

            // 3. Машины
            cars.forEach(car => { car.update(cars); car.draw(); });
            
            // Удаление далеких машин
            if(cars.length > 150) {
                cars = cars.filter(c => {
                    const dist = Math.hypot(c.getGX() - (camera.x + width/scale/2), c.getGY() - (camera.y + height/scale/2));
                    return dist < 1500;
                });
            }

            requestAnimationFrame(loop);
        }

        // Инпут (Drag & Zoom)
        let isD = false, lx, ly;
        canvas.onmousedown = e => { isD = true; lx = e.clientX; ly = e.clientY; };
        window.onmousemove = e => { if(isD) { camera.x -= (e.clientX-lx)/scale; camera.y -= (e.clientY-ly)/scale; lx = e.clientX; ly = e.clientY; }};
        window.onmouseup = () => isD = false;
        
        canvas.onwheel = e => {
            const os = scale; scale = Math.max(0.2, Math.min(2.5, scale - e.deltaY*0.001));
            camera.x += (e.clientX/os) - (e.clientX/scale); camera.y += (e.clientY/os) - (e.clientY/scale);
        };

        // Тач
        canvas.ontouchstart = e => { isD = true; lx = e.touches[0].clientX; ly = e.touches[0].clientY; };
        canvas.ontouchmove = e => { if(isD) { camera.x -= (e.touches[0].clientX-lx)/scale; camera.y -= (e.touches[0].clientY-ly)/scale; lx = e.touches[0].clientX; ly = e.touches[0].clientY; }};
        canvas.ontouchend = () => isD = false;

        loop();
    </script>
</body>
</html>
