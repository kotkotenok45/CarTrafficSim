<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Traffic: Tow Truck Edition</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { margin: 0; background: #070707; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; font-family: sans-serif; touch-action: none; }
        canvas { background: #111; max-width: 100%; max-height: 100%; object-fit: contain; }
        #ui { position: absolute; top: 30px; left: 30px; color: #eee; pointer-events: none; text-shadow: 1px 1px 4px black; }
        h1 { margin: 0; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div id="ui"><h1>Traffic AI</h1><p>Tow Truck Service Active 🚨</p></div>
    <canvas id="simCanvas"></canvas>

    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});

        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 800;

        const CAR_WIDTH = 22, CAR_LENGTH = 44, MAX_SPEED = 4.0, ACCEL = 0.12, BRAKE_FORCE = 0.3;
        let cars = [], explosions = [], towTrucks = [];

        class Car {
            constructor(lane, isTow = false) {
                this.lane = lane;
                this.isTow = isTow;
                this.color = isTow ? '#ffcc00' : `hsl(${Math.random() * 360}, 60%, 55%)`;
                this.speed = isTow ? 5 : 3 + Math.random();
                this.crashed = false;
                this.braking = false;
                this.target = null; // Для эвакуатора
                
                const off = 30;
                // Эвакуатор может ехать по встречке (off инвертируется случайно)
                const side = (isTow && Math.random() > 0.5) ? -off : off;

                if(lane==0){this.x=400-side; this.y=-150; this.angle=Math.PI/2;}
                if(lane==1){this.x=950; this.y=400-side; this.angle=Math.PI;}
                if(lane==2){this.x=400+side; this.y=950; this.angle=-Math.PI/2;}
                if(lane==3){this.x=-150; this.y=400+side; this.angle=0;}
            }

            update(allCars) {
                if (this.crashed) return;

                let stop = false;

                // Обычные машины останавливаются перед ДТП или эвакуатором
                if (!this.isTow) {
                    allCars.concat(towTrucks).forEach(other => {
                        if (other === this) return;
                        const d = Math.hypot(other.x - this.x, other.y - this.y);
                        const dx = other.x - this.x;
                        const dy = other.y - this.y;
                        const dot = (dx * Math.cos(this.angle) + dy * Math.sin(this.angle)) / d;

                        // Видят аварию или эвакуатор впереди
                        if (d < 120 && dot > 0.6 && (other.crashed || other.isTow)) {
                            stop = true;
                        } else if (d < 80 && dot > 0.8) { // Обычная дистанция
                            stop = true;
                        }
                    });
                } else {
                    // Логика эвакуатора: едет к ближайшей аварии
                    if (this.target) {
                        const dToTarget = Math.hypot(this.target.x - this.x, this.target.y - this.y);
                        if (dToTarget < 30) {
                            this.speed = 0;
                            setTimeout(() => {
                                cars = cars.filter(c => !c.crashed);
                                explosions = [];
                                this.target = null;
                            }, 2000);
                        }
                    } else {
                        this.speed = 5; // Уезжает после работы
                    }
                }

                if (stop) {
                    this.speed = Math.max(0, this.speed - BRAKE_FORCE);
                    this.braking = true;
                } else {
                    this.speed = Math.min(this.isTow ? 5 : MAX_SPEED, this.speed + ACCEL);
                    this.braking = false;
                }

                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                // Коллизии (только для обычных машин)
                if (!this.isTow) {
                    allCars.forEach(other => {
                        if (other !== this && !other.isTow && Math.hypot(this.x - other.x, this.y - other.y) < 28) {
                            if (!this.crashed) {
                                this.crashed = true;
                                other.crashed = true;
                                explosions.push({x: this.x, y: this.y, life: 100});
                                spawnTowTruck(this);
                            }
                        }
                    });
                }
            }

            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                
                // Свет фар
                const g = ctx.createLinearGradient(20,0,80,0);
                g.addColorStop(0, this.isTow ? 'rgba(255,200,0,0.2)' : 'rgba(255,255,220,0.2)');
                g.addColorStop(1, 'transparent');
                ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(22,-10); ctx.lineTo(100,-40); ctx.lineTo(100,40); ctx.lineTo(22,10); ctx.fill();

                // Тело
                ctx.fillStyle = this.color;
                ctx.fillRect(-22, -11, 44, 22);
                
                // Мигалка эвакуатора
                if (this.isTow) {
                    ctx.fillStyle = (Math.floor(Date.now() / 200) % 2) ? '#ff6600' : '#331100';
                    ctx.beginPath(); ctx.arc(0, 0, 5, 0, 7); ctx.fill();
                    if (ctx.fillStyle === '#ff6600') {
                        ctx.shadowBlur = 15; ctx.shadowColor = 'orange';
                        ctx.strokeRect(-5, -5, 10, 10);
                    }
                }

                ctx.restore();
            }
        }

        function spawnTowTruck(target) {
            if (towTrucks.length > 0) return; // Один за раз
            const t = new Car(Math.floor(Math.random()*4), true);
            t.target = target;
            towTrucks.push(t);
        }

        function drawScene() {
            ctx.fillStyle = '#0f0f0f'; ctx.fillRect(0,0,800,800);
            ctx.fillStyle = '#1c1c1c'; ctx.fillRect(330,0,140,800); ctx.fillRect(0,330,800,140);
            
            // Фонари
            [[310,310],[490,310],[310,490],[490,490]].forEach(p => {
                const g = ctx.createRadialGradient(p[0],p[1],0,p[0],p[1],150);
                g.addColorStop(0,'rgba(255,200,100,0.1)'); g.addColorStop(1,'transparent');
                ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p[0],p[1],150,0,7); ctx.fill();
            });
        }

        function loop() {
            drawScene();
            
            if (Math.random() < 0.03 && !cars.some(c => c.crashed)) {
                const lane = Math.floor(Math.random()*4);
                cars.push(new Car(lane));
            }

            // Фильтрация уехавших
            cars = cars.filter(c => c.x > -200 && c.x < 1000 && c.y > -200 && c.y < 1000);
            towTrucks = towTrucks.filter(t => t.x > -250 && t.x < 1050 && t.y > -250 && t.y < 1050);

            [...cars, ...towTrucks].forEach(c => {
                c.update(cars);
                c.draw();
            });

            explosions.forEach(e => {
                ctx.font = '30px Arial'; ctx.fillText('💥', e.x-15, e.y+10);
            });

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
