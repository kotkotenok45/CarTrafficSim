<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart City: Night Fixed</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; }
        body { margin: 0; background: #0a0a0a; color: white; overflow: hidden; font-family: system-ui; touch-action: none; position: fixed; width: 100%; height: 100%; }
        canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; text-shadow: 1px 1px 3px black; }
        .zoom-btns { position: absolute; bottom: 30px; left: 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn { width: 50px; height: 50px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; backdrop-filter: blur(5px); pointer-events: auto; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Smart City AI</h1>
        <p>Двигай пальцем карту</p>
    </div>
    <div class="zoom-btns">
        <div class="btn" onclick="changeZoom(0.1)">+</div>
        <div class="btn" onclick="changeZoom(-0.1)">−</div>
    </div>
    <canvas id="sim"></canvas>

    <script>
        const canvas = document.getElementById('sim');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let scale = 0.6;
        let offset = { x: 0, y: 0 };
        const ROAD_W = 160, SIDEWALK_W = 60;
        let entities = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            if (offset.x === 0) { offset.x = width / 2; offset.y = height / 2; }
        }
        window.addEventListener('resize', resize);
        resize();

        function changeZoom(delta) {
            scale = Math.max(0.2, Math.min(2, scale + delta));
        }

        // --- УПРАВЛЕНИЕ POINTER EVENTS (Самое стабильное) ---
        let isPointerDown = false;
        let lastPos = { x: 0, y: 0 };

        canvas.addEventListener('pointerdown', e => {
            isPointerDown = true;
            lastPos.x = e.clientX;
            lastPos.y = e.clientY;
            canvas.setPointerCapture(e.pointerId);
        });

        canvas.addEventListener('pointermove', e => {
            if (!isPointerDown) return;
            const dx = e.clientX - lastPos.x;
            const dy = e.clientY - lastPos.y;
            offset.x += dx;
            offset.y += dy;
            lastPos.x = e.clientX;
            lastPos.y = e.clientY;
        });

        canvas.addEventListener('pointerup', () => isPointerDown = false);
        canvas.addEventListener('pointercancel', () => isPointerDown = false);

        // Пешеходы
        class Pedestrian {
            constructor() { this.reset(); }
            reset() {
                const side = Math.random() > 0.5;
                if(side) {
                    this.x = (Math.random() > 0.5 ? -1 : 1) * (ROAD_W/2 + 30);
                    this.y = (Math.random() - 0.5) * 2000;
                    this.vx = 0; this.vy = (Math.random() - 0.5) * 1.2;
                } else {
                    this.y = (Math.random() > 0.5 ? -1 : 1) * (ROAD_W/2 + 30);
                    this.x = (Math.random() - 0.5) * 2000;
                    this.vy = 0; this.vx = (Math.random() - 0.5) * 1.2;
                }
            }
            update() { this.x += this.vx; this.y += this.vy; if(Math.abs(this.x) > 1200 || Math.abs(this.y) > 1200) this.reset(); }
            draw() { ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, 7); ctx.fill(); }
        }

        // Машины
        class Car {
            constructor(lane) {
                this.lane = lane;
                this.color = `hsl(${Math.random()*360}, 60%, 50%)`;
                this.speed = 0; this.maxSpeed = 3 + Math.random();
                const off = 40;
                if(lane==0){this.x=-off; this.y=-1000; this.angle=Math.PI/2;}
                if(lane==1){this.x=1000; this.y=-off; this.angle=Math.PI;}
                if(lane==2){this.x=off; this.y=1000; this.angle=-Math.PI/2;}
                if(lane==3){this.x=-1000; this.y=off; this.angle=0;}
            }
            update() {
                let blocked = false;
                entities.forEach(other => {
                    if(other === this) return;
                    const d = Math.hypot(other.x - this.x, other.y - this.y);
                    if (d < 100) {
                        const dot = ((other.x-this.x)*Math.cos(this.angle)+(other.y-this.y)*Math.sin(this.angle))/d;
                        if(dot > 0.7) blocked = true;
                    }
                });
                this.speed = blocked ? Math.max(0, this.speed - 0.4) : Math.min(this.maxSpeed, this.speed + 0.1);
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                ctx.fillStyle = this.color; ctx.fillRect(-22, -11, 44, 22);
                ctx.restore();
            }
        }

        function drawMap() {
            ctx.fillStyle = '#112211'; ctx.fillRect(-2000, -2000, 4000, 4000); // Трава
            ctx.fillStyle = '#1a1a1a'; ctx.fillRect(-ROAD_W/2, -2000, ROAD_W, 4000); ctx.fillRect(-2000, -ROAD_W/2, 4000, ROAD_W); // Дороги
            ctx.fillStyle = '#2a2a2a'; // Тротуары
            ctx.fillRect(-ROAD_W/2-SIDEWALK_W, -2000, SIDEWALK_W, 4000); ctx.fillRect(ROAD_W/2, -2000, SIDEWALK_W, 4000);
            ctx.fillRect(-2000, -ROAD_W/2-SIDEWALK_W, 4000, SIDEWALK_W); ctx.fillRect(-2000, ROAD_W/2, 4000, SIDEWALK_W);
        }

        for(let i=0; i<40; i++) entities.push(new Pedestrian());

        function loop() {
            ctx.setTransform(1,0,0,1,0,0);
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,width,height);
            ctx.translate(offset.x, offset.y);
            ctx.scale(scale, scale);
            drawMap();
            if(Math.random() < 0.03 && entities.filter(e => e instanceof Car).length < 20) entities.push(new Car(Math.floor(Math.random()*4)));
            entities = entities.filter(e => Math.abs(e.x) < 1200 && Math.abs(e.y) < 1200);
            entities.forEach(e => { e.update(); e.draw(); });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
