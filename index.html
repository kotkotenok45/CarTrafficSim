<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>City Sim PWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #222;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: sans-serif;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="ui">
        Используйте стрелки или тач для перемещения
    </div>
    <canvas id="cityCanvas"></canvas>

    <script>
        const canvas = document.getElementById('cityCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let camera = { x: 0, y: 0 };
        const GRID_SIZE = 200; // Размер одного квартала

        // Регистрация Service Worker (у вас он уже есть, просто подключаем)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW error:', err));
            });
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // Простая псевдослучайная функция для генерации города по координатам
        function seededRandom(x, y) {
            const seed = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
            return seed - Math.floor(seed);
        }

        function drawCity() {
            ctx.fillStyle = '#333'; // Фон асфальта
            ctx.fillRect(0, 0, width, height);

            const startCol = Math.floor(camera.x / GRID_SIZE);
            const endCol = Math.ceil((camera.x + width) / GRID_SIZE);
            const startRow = Math.floor(camera.y / GRID_SIZE);
            const endRow = Math.ceil((camera.y + height) / GRID_SIZE);

            for (let col = startCol; col <= endCol; col++) {
                for (let row = startRow; row <= endRow; row++) {
                    const x = col * GRID_SIZE - camera.x;
                    const y = row * GRID_SIZE - camera.y;

                    // Рисуем дороги
                    ctx.strokeStyle = '#444';
                    ctx.lineWidth = 20;
                    ctx.strokeRect(x, y, GRID_SIZE, GRID_SIZE);

                    // Генерируем здание в квартале
                    const rand = seededRandom(col, row);
                    if (rand > 0.3) { // 70% шанс появления здания
                        const padding = 40;
                        const bWidth = GRID_SIZE - padding * 2;
                        const bHeight = GRID_SIZE - padding * 2;
                        
                        // Цвет здания зависит от координат
                        const hue = Math.floor(rand * 360);
                        ctx.fillStyle = `hsl(${hue}, 30%, 40%)`;
                        ctx.fillRect(x + padding, y + padding, bWidth, bHeight);

                        // Рисуем "окна"
                        ctx.fillStyle = rand > 0.6 ? '#f1c40f' : '#2c3e50'; 
                        for(let i=0; i<3; i++) {
                            for(let j=0; j<3; j++) {
                                ctx.fillRect(x + padding + 10 + i*15, y + padding + 10 + j*15, 8, 8);
                            }
                        }
                    }
                }
            }
        }

        // Управление (Мышь/Тач)
        let isDragging = false;
        let lastX, lastY;

        const startMove = (x, y) => { isDragging = true; lastX = x; lastY = y; };
        const doMove = (x, y) => {
            if (!isDragging) return;
            camera.x -= (x - lastX);
            camera.y -= (y - lastY);
            lastX = x;
            lastY = y;
        };
        const endMove = () => { isDragging = false; };

        canvas.addEventListener('mousedown', e => startMove(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => doMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', endMove);

        canvas.addEventListener('touchstart', e => startMove(e.touches[0].clientX, e.touches[0].clientY));
        canvas.addEventListener('touchmove', e => doMove(e.touches[0].clientX, e.touches[0].clientY));
        canvas.addEventListener('touchend', endMove);

        function update() {
            drawCity();
            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
