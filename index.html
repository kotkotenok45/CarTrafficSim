<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Traffic: Tow Truck Fixed</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { margin: 0; background: #070707; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; touch-action: none; }
        canvas { background: #111; max-width: 100%; max-height: 100%; object-fit: contain; }
        #ui { position: absolute; top: 30px; left: 30px; color: #eee; pointer-events: none; text-shadow: 1px 1px 4px black; }
    </style>
</head>
<body>
    <div id="ui"><h1>Traffic AI</h1><p>Система эвакуации исправлена 🚨</p></div>
    <canvas id="simCanvas"></canvas>

    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});

        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 800;

        const CAR_WIDTH = 22, CAR_LENGTH = 44, MAX_SPEED = 4.0, ACCEL = 0.15, BRAKE_FORCE = 0.4;
        let cars = [], explosions = [], towTrucks = [];

        class Car {
            constructor(lane, isTow = false) {
                this.lane = lane;
                this.isTow = isTow;
                this.color = isTow ? '#ffcc00' : `hsl(${Math.random() * 360}, 60%, 55%)`;
                this.speed = isTow ? 4.5 : 3 + Math.random();
                this.crashed = false;
                this.braking = false;
                this.target = null;
                this.workTimer = 0; // Время на погрузку

                const off = 30;
                // Эвакуатор может ехать по встречке (side может быть отрицательным)
                const isWrongWay = isTow && Math.random() > 0.4;
                const side = isWrongWay ? -off : off;

                if(lane==0){this.x=400-side; this.y=-150; this.angle=Math.PI/2;}
                if(lane==1){this.x=950; this.y=400-side; this.angle=Math.PI;}
                if(lane==2){this.x=400+side; this.y=950; this.angle=-Math.PI/2;}
                if(lane==3){this.x=-150; this.y=400+side; this.angle=0;}
            }

            update(allCars) {
                if (this.crashed) return;

                let shouldStop = false;

                if (!this.isTow) {
                    // Логика обычных машин: тормозить перед ДТП или эвакуатором
                    [...allCars, ...towTrucks].forEach(other => {
                        if (other === this) return;
                        const d = Math.hypot(other.x - this.x, other.y - this.y);
                        const dx = other.x - this.x;
                        const dy = other.y - this.y;
                        const dot = (dx * Math.cos(this.angle) + dy * Math.sin(this.angle)) / d;

                        if (d < 110 && dot > 0.7 && (other.crashed || other.isTow)) {
                            shouldStop = true;
                        } else if (d < 75 && dot > 0.8) {
                            shouldStop = true;
                        }
                    });
                } else {
                    // Логика эвакуатора
                    if (this.target) {
                        const distToTarget = Math.hypot(this.target.x - this.x, this.target.y - this.y);
                        
                        if (distToTarget < 50) {
                            // Приехал на место
                            this.speed = 0;
                            this.workTimer++;
                            if (this.workTimer > 120) { // Остановка на ~2 секунды
                                // Забираем все машины в радиусе аварии
                                const tx = this.target.x;
                                const ty = this.target.y;
                                cars = cars.filter(c => Math.hypot(c.x - tx, c.y - ty) > 60);
                                explosions = []; // Убираем эффект взрыва
                                this.target = null; // Работа закончена, цель снята
                                this.workTimer = 0;
                            }
                        } else {
                            this.speed = 4.5; // Едем к цели
                        }
                    } else {
                        this.speed = 4.5; // Уезжаем с карты
                    }
                }

                if (shouldStop || (this.isTow && this.speed === 0)) {
                    this.speed = Math.max(0, this.speed - BRAKE_FORCE);
                    this.braking = true;
                } else {
                    this.speed = Math.min(this.isTow ? 4.5 : MAX_SPEED, this.speed + ACCEL);
                    this.braking = false;
                }

                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                // Проверка столкновения (только для обычных машин)
                if (!this.isTow && !this.crashed) {
                    allCars.forEach(other => {
                        if (other !== this && !other.isTow && !other.crashed) {
                            if (Math.hypot(this.x - other.x, this.y - other.y) < 28) {
                                this.crashed = true;
                                other.crashed = true;
                                this.speed = 0;
                                other.speed = 0;
                                explosions.push({x: this.x, y: this.y});
                                callTowTruck(this);
                            }
                        }
                    });
                }
            }

            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                
                // Фары
                const g = ctx.createLinearGradient(20,0,70,0);
                g.addColorStop(0, this.isTow ? 'rgba(255,200,0,0.3)' : 'rgba(255,255,220,0.2)');
                g.addColorStop(1, 'transparent');
                ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(22,-10); ctx.lineTo(90,-35); ctx.lineTo(90,35); ctx.lineTo(22,10); ctx.fill();

                // Кузов
                ctx.fillStyle = this.color;
                ctx.fillRect(-22, -11, 44, 22);
                
                // Детали эвакуатора
                if (this.isTow) {
                    // Маячок
                    const flash = (Math.floor(Date.now() / 150) % 2) === 0;
                    ctx.fillStyle = flash ? '#ffaa00' : '#442200';
                    ctx.beginPath(); ctx.arc(0, 0, 6, 0, 7); ctx.fill();
                    if (flash) {
                        ctx.shadowBlur = 20; ctx.shadowColor = 'orange';
                        ctx.strokeStyle = 'white'; ctx.strokeRect(-6, -6, 12, 12);
                    }
                    // Платформа
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.fillRect(-20, -8, 15, 16);
                }

                ctx.restore();
                ctx.shadowBlur = 0; // Сброс тени
            }
        }

        function callTowTruck(victim) {
            // Проверяем, нет ли уже эвакуатора, едущего к этой аварии
            if (towTrucks.some(t => t.target === victim)) return;
            
            const truck = new Car(Math.floor(Math.random()*4), true);
            truck.target = victim;
            towTrucks.push(truck);
        }

        function drawScene() {
            ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0,0,800,800);
            ctx.fillStyle = '#1a1a1a'; ctx.fillRect(330,0,140,800); ctx.fillRect(0,330,800,140);
            
            // Фонари
            [[310,310],[490,310],[310,490],[490,490]].forEach(p => {
                const g = ctx.createRadialGradient(p[0],p[1],0,p[0],p[1],160);
                g.addColorStop(0,'rgba(255,180,80,0.08)'); g.addColorStop(1,'transparent');
                ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p[0],p[1],160,0,7); ctx.fill();
            });
        }

        function loop() {
            drawScene();
            
            // Спавн машин только если нет больших пробок
            if (Math.random() < 0.03 && cars.length < 25) {
                const lane = Math.floor(Math.random()*4);
                // Проверка, чтобы не спавнить одну в другую на старте
                if (!cars.some(c => c.lane === lane && (c.y < 50 && c.y > -50 || c.x < 50 && c.x > -50))) {
                    cars.push(new Car(lane));
                }
            }

            cars = cars.filter(c => c.x > -300 && c.x < 1100 && c.y > -300 && c.y < 1100);
            towTrucks = towTrucks.filter(t => t.x > -300 && t.x < 1100 && t.y > -300 && t.y < 1100);

            const all = [...cars, ...towTrucks];
            all.forEach(obj => {
                obj.update(cars);
                obj.draw();
            });

            explosions.forEach(e => {
                ctx.font = '30px Arial'; ctx.fillText('💥', e.x-15, e.y+10);
            });

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
