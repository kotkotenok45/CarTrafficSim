<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Traffic AI</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; touch-action: none; }
        canvas { background: #222; max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 20px; left: 20px; color: #eee; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui"><h1>Traffic AI</h1><p>Night Mode | Smart Yield</p></div>
    <canvas id="simCanvas"></canvas>

    <script>
        // Регистрация SW
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(console.error);
        }

        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 800;

        const CAR_WIDTH = 20, CAR_LENGTH = 40, MAX_SPEED = 3.5, ACCEL = 0.1, BRAKE_FORCE = 0.2, SENSOR = 80;
        let cars = [], explosions = [];

        class Car {
            constructor(lane) {
                this.lane = lane;
                this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
                this.speed = 2.5 + Math.random();
                this.braking = false;
                this.crashed = false;
                const laneW = 60;
                if(lane==0){this.x=370; this.y=-50; this.angle=Math.PI/2}
                if(lane==1){this.x=850; this.y=370; this.angle=Math.PI}
                if(lane==2){this.x=430; this.y=850; this.angle=-Math.PI/2}
                if(lane==3){this.x=-50; this.y=430; this.angle=0}
            }
            update(all) {
                if(this.crashed) return;
                let obstacle = false;
                all.forEach(other => {
                    if(other === this || other.crashed) return;
                    const d = Math.hypot(other.x-this.x, other.y-this.y);
                    const dot = ((other.x-this.x)*Math.cos(this.angle)+(other.y-this.y)*Math.sin(this.angle))/d;
                    if(d < SENSOR && dot > 0.7) obstacle = true;
                });
                if(obstacle){ this.speed = Math.max(0, this.speed-BRAKE_FORCE); this.braking = true; }
                else { this.speed = Math.min(MAX_SPEED, this.speed+ACCEL); this.braking = false; }
                this.x += Math.cos(this.angle)*this.speed; this.y += Math.sin(this.angle)*this.speed;
                all.forEach(other => {
                    if(other!==this && Math.hypot(this.x-other.x, this.y-other.y) < 25) {
                        this.crashed = other.crashed = true;
                        explosions.push({x:this.x, y:this.y, life:30});
                    }
                });
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                const g = ctx.createLinearGradient(20,0,80,0);
                g.addColorStop(0,'rgba(255,255,200,0.3)'); g.addColorStop(1,'transparent');
                ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(20,0); ctx.lineTo(90,-30); ctx.lineTo(90,30); ctx.fill();
                ctx.fillStyle=this.color; ctx.fillRect(-20,-10,40,20);
                ctx.fillStyle=this.braking?'#f00':'#500'; ctx.fillRect(-20,-10,3,6); ctx.fillRect(-20,4,3,6);
                ctx.restore();
            }
        }

        function loop() {
            ctx.fillStyle='#222'; ctx.fillRect(0,0,800,800);
            ctx.fillStyle='#333'; ctx.fillRect(340,0,120,800); ctx.fillRect(0,340,800,120);
            if(Math.random()<0.02) cars.push(new Car(Math.floor(Math.random()*4)));
            cars = cars.filter(c => c.x>-100 && c.x<900 && c.y>-100 && c.y<900);
            cars.forEach(c => { c.update(cars); c.draw(); });
            explosions.forEach((e,i) => { ctx.font='30px Arial'; ctx.fillText('💥',e.x-15,e.y+10); if(--e.life<=0) explosions.splice(i,1); });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
