<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Traffic AI: Soft Light</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { margin: 0; background: #070707; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; touch-action: none; -webkit-tap-highlight-color: transparent; }
        canvas { background: #111; max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 0 50px rgba(255,180,100,0.15); }
        #ui { position: absolute; top: 30px; left: 30px; color: #eee; pointer-events: none; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); }
        h1 { margin: 0; font-size: 1.4rem; font-weight: 700; letter-spacing: -1px; }
        p { margin: 5px 0; font-size: 0.9rem; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="ui"><h1>Traffic AI</h1><p>Night City | Volumetric Light | Fixed Spawn</p></div>
    <canvas id="simCanvas"></canvas>

    <script>
        // Регистрация SW (не требует изменений)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 800;

        // Константы симуляции (Улучшено)
        const CAR_WIDTH = 22, CAR_LENGTH = 44, MAX_SPEED = 4.2, ACCEL = 0.15, BRAKE_FORCE = 0.35;
        const SENSOR_DIST = 95; // Увеличен, чтобы лучше видеть издалека
        const SPAWN_CHANCE = 0.04; // Оптимизировано, чтобы не забивать перекресток

        // Границы, за которыми машина считается "на экране"
        const VIEW_MARGIN = 60; // Расстояние от края холста до точки спавна

        let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    
    // Если пришли из магазина — сразу показываем окно!
    if (new URLSearchParams(window.location.search).get('install') === 'true') {
        if (deferredPrompt) deferredPrompt.prompt();
    }
});
        
        let cars = [], explosions = [];

        class Car {
            constructor(lane) {
                this.lane = lane;
                this.color = `hsl(${Math.random() * 360}, 60%, 55%)`;
                this.speed = 3.2 + Math.random();
                this.crashed = false;
                this.braking = false;
                
                const roadW = 140; 
                const centerOffset = 30; // Смещение от центральной линии в свою полосу

                // Улучшенный спавн: Машины появляются ДАЛЬШЕ за границей видимости
                // Чтобы была дистанция для торможения еще ДО въезда на холст.
                if(lane==0){this.x=400-centerOffset; this.y=-200; this.angle=Math.PI/2;} // Сверху вниз
                if(lane==1){this.x=1000; this.y=400-centerOffset; this.angle=Math.PI;} // Справа налево
                if(lane==2){this.x=400+centerOffset; this.y=1000; this.angle=-Math.PI/2;} // Снизу вверх
                if(lane==3){this.x=-200; this.y=400+centerOffset; this.angle=0;} // Слева направо
            }
            update(all) {
                if(this.crashed) return;
                
                let min_d = Infinity;
                let obstacle = null;

                // Улучшенная логика обнаружения
                all.forEach(other => {
                    if(other === this || other.crashed) return;
                    const dx = other.x - this.x;
                    const dy = other.y - this.y;
                    const d = Math.hypot(dx, dy);

                    // Учитываем только машины строго впереди в своей полосе
                    const dot = (dx*Math.cos(this.angle)+(dy*Math.sin(this.angle)))/d;
                    if(d < SENSOR_DIST && dot > 0.75) {
                        if(d < min_d) {
                            min_d = d;
                            obstacle = other;
                        }
                    }
                });

                // Торможение при наличии препятствия
                if(obstacle) {
                    const obstacle_d = Math.hypot(obstacle.x-this.x, obstacle.y-this.y);
                    this.braking = true;
                    // Экстренное торможение если очень близко
                    if (obstacle_d < SENSOR_DIST/2.5) {
                        this.speed = Math.max(0, this.speed - BRAKE_FORCE * 1.5);
                    } else {
                        // Плавное если есть место
                        this.speed = Math.max(0.5, this.speed - BRAKE_FORCE * 0.9);
                    }
                } else {
                    this.speed = Math.min(MAX_SPEED, this.speed + ACCEL);
                    this.braking = false;
                }

                // Обновление позиции
                this.x += Math.cos(this.angle)*this.speed;
                this.y += Math.sin(this.angle)*this.speed;

                // Проверка столкновений
                all.forEach(other => {
                    if(other!==this && Math.hypot(this.x-other.x, this.y-other.y) < 28) {
                        this.crashed = other.crashed = true;
                        this.speed = other.speed = 0;
                        explosions.push({x:this.x, y:this.y, life:35});
                    }
                });
            }
            draw() {
                // Не рисуем машину, пока она далеко за границей спавна
                if (this.x < -CAR_LENGTH || this.x > canvas.width + CAR_LENGTH || 
                    this.y < -CAR_LENGTH || this.y > canvas.height + CAR_LENGTH) return;

                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                
                // Свет фар (тоже стал мягче)
                const g = ctx.createLinearGradient(22,0,SENSOR_DIST,0);
                g.addColorStop(0,'rgba(255,255,220,0.3)'); g.addColorStop(1,'transparent');
                ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(22,-8); ctx.lineTo(115,-45); ctx.lineTo(115,45); ctx.lineTo(22,8); ctx.fill();
                
                // Корпус
                ctx.fillStyle=this.color; ctx.fillRect(-22,-11,44,22);
                ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(-7,-11,14,22); // Крыша
                
                // Стоп-сигналы
                ctx.fillStyle=this.braking?'#ff1100':'#660000'; ctx.fillRect(-22,-11,3,6); ctx.fillRect(-22,5,3,6);
                if(this.braking) { ctx.shadowBlur=15; ctx.shadowColor='#f00'; ctx.fillRect(-22,-11,1,22); }
                
                ctx.restore();
            }
        }

        // Улучшенное рисование сцены и ОСВЕЩЕНИЯ (НОВОЕ)
        function drawScene() {
            ctx.fillStyle='#0f0f0f'; ctx.fillRect(0,0,800,800);
            
            // Дороги
            ctx.fillStyle='#1c1c1c'; ctx.fillRect(330,0,140,800); ctx.fillRect(0,330,800,140);
            
            // Разметка (тусклая)
            ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1; ctx.setLineDash([15, 15]);
            ctx.beginPath(); ctx.moveTo(400,0); ctx.lineTo(400,800); ctx.moveTo(0,400); ctx.lineTo(800,400); ctx.stroke();
            ctx.setLineDash([]); ctx.lineWidth=1;
            
            // НОВОЕ: "Рассеянное" уличное освещение (Уличные фонари по углам)
            // Вместо жестких кругов используем слоистые градиенты для эффекта дымки
            const lights = [ [310, 310], [490, 310], [310, 490], [490, 490] ];
            lights.forEach(pos => {
                // Основной рассеянный объемный свет (большой, очень тусклый)
                const g_outer = ctx.createRadialGradient(pos[0], pos[1], 10, pos[0], pos[1], 190);
                g_outer.addColorStop(0, 'rgba(255, 200, 100, 0.05)'); 
                g_outer.addColorStop(1, 'transparent');
                ctx.fillStyle = g_outer; ctx.beginPath(); ctx.arc(pos[0], pos[1], 190, 0, Math.PI*2); ctx.fill();

                // Ядро теплого света (меньше, ярче)
                const g_inner = ctx.createRadialGradient(pos[0], pos[1], 0, pos[0], pos[1], 70);
                g_inner.addColorStop(0, 'rgba(255, 190, 110, 0.15)'); 
                g_inner.addColorStop(1, 'transparent');
                ctx.fillStyle = g_inner; ctx.beginPath(); ctx.arc(pos[0], pos[1], 70, 0, Math.PI*2); ctx.fill();

                // Точка фонаря (очень яркая в центре)
                ctx.fillStyle = '#ffe0aa'; 
                ctx.beginPath(); ctx.arc(pos[0], pos[1], 5, 0, Math.PI*2); ctx.fill();
            });
        }

        function loop() {
            // Уменьшенный шанс спавна для предотвращения забивания перекрестка
            if(Math.random()<SPAWN_CHANCE) {
                const lane = Math.floor(Math.random()*4);
                // Проверка: не спавнить, если в этой полосе уже стоит машина в очереди
                const isBlocked = cars.some(c => c.lane === lane && (c.x < 50 || c.x > 750 || c.y < 50 || c.y > 750));
                if (!isBlocked) cars.push(new Car(lane));
            }
            
            drawScene(); // Рисуем сцену и освещение ПЕРЕД машинами
            
            // Удаляем машины, которые уехали далеко за границы (ФИКС спавна)
            cars = cars.filter(c => c.x>-250 && c.x<1050 && c.y>-250 && c.y<1050);
            
            cars.forEach(c => { c.update(cars); c.draw(); });
            
            explosions.forEach((e,i) => { ctx.font='35px Arial'; ctx.fillText('💥',e.x-18,e.y+12); if(--e.life<=0) explosions.splice(i,1); });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
