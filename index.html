<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart City Sim</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { margin: 0; background: #0a0a0a; color: white; overflow: hidden; font-family: sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; text-shadow: 1px 1px 2px black; z-index: 10; }
        .controls { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; z-index: 10;}
    </style>
</head>
<body>
    <div id="ui">
        <h1>Smart City AI</h1>
        <p>Zoom: Pinch or Wheel | Smart Pedestrians</p>
    </div>
    <canvas id="sim"></canvas>

    <script>
        const canvas = document.getElementById('sim');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let scale = 0.8; // Начальный зум
        let offset = { x: 0, y: 0 };
        
        const ROAD_W = 160;
        const SIDEWALK_W = 60;
        let entities = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            offset.x = width / 2;
            offset.y = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- ЛОГИКА ЗУМА ---
        window.addEventListener('wheel', e => {
            const zoomSpeed = 0.001;
            scale -= e.deltaY * zoomSpeed;
            scale = Math.max(0.3, Math.min(2, scale));
        });

        let initialDist = 0;
        window.addEventListener('touchstart', e => {
            if (e.touches.length === 2) {
                initialDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            }
        });
        window.addEventListener('touchmove', e => {
            if (e.touches.length === 2) {
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                scale *= (dist / initialDist);
                initialDist = dist;
                scale = Math.max(0.3, Math.min(2, scale));
            }
        });

        class Pedestrian {
            constructor() {
                this.type = 'ped';
                this.reset();
            }
            reset() {
                // Спавнятся на тротуарах
                const onSide = Math.random() > 0.5;
                if(onSide) {
                    this.x = (Math.random() > 0.5 ? -1 : 1) * (ROAD_W/2 + 30);
                    this.y = (Math.random() - 0.5) * 1000;
                    this.vx = 0; this.vy = (Math.random() - 0.5) * 2;
                } else {
                    this.y = (Math.random() > 0.5 ? -1 : 1) * (ROAD_W/2 + 30);
                    this.x = (Math.random() - 0.5) * 1000;
                    this.vy = 0; this.vx = (Math.random() - 0.5) * 2;
                }
                this.color = '#fff';
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if(Math.abs(this.x) > 1000 || Math.abs(this.y) > 1000) this.reset();
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 4, 0, Math.PI*2);
                ctx.fill();
            }
        }

        class Car {
            constructor(lane) {
                this.type = 'car';
                this.lane = lane; // 0: Down, 1: Left, 2: Up, 3: Right
                this.length = 40;
                this.width = 20;
                this.color = `hsl(${Math.random()*360}, 60%, 50%)`;
                this.speed = 0;
                this.maxSpeed = 3 + Math.random();
                
                const off = 40;
                if(lane==0){this.x = -off; this.y = -800; this.angle = Math.PI/2;}
                if(lane==1){this.x = 800; this.y = -off; this.angle = Math.PI;}
                if(lane==2){this.x = off; this.y = 800; this.angle = -Math.PI/2;}
                if(lane==3){this.x = -800; this.y = off; this.angle = 0;}
            }
            update() {
                let safeDist = 100;
                let blocked = false;

                // Видит другие машины и пешеходов
                entities.forEach(other => {
                    if(other === this) return;
                    const d = Math.hypot(other.x - this.x, other.y - this.y);
                    const dx = other.x - this.x;
                    const dy = other.y - this.y;
                    const dot = (dx * Math.cos(this.angle) + dy * Math.sin(this.angle)) / d;

                    if(d < safeDist && dot > 0.7) blocked = true;
                });

                if(blocked) {
                    this.speed = Math.max(0, this.speed - 0.3);
                } else {
                    this.speed = Math.min(this.maxSpeed, this.speed + 0.1);
                }

                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                if(Math.abs(this.x) > 1000 || Math.abs(this.y) > 1000) {
                    const idx = entities.indexOf(this);
                    entities.splice(idx, 1);
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                // Фары
                ctx.fillStyle = 'rgba(255,255,200,0.2)';
                ctx.beginPath(); ctx.moveTo(20,0); ctx.lineTo(80,-30); ctx.lineTo(80,30); ctx.fill();
                // Тело
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.length/2, -this.width/2, this.length, this.width);
                // Стоп-сигналы
                if(this.speed < 1) {
                    ctx.fillStyle = 'red';
                    ctx.fillRect(-this.length/2, -this.width/2, 2, 5);
                    ctx.fillRect(-this.length/2, this.width/2 - 5, 2, 5);
                }
                ctx.restore();
            }
        }

        function drawMap() {
            // Трава
            ctx.fillStyle = '#112211';
            ctx.fillRect(-2000, -2000, 4000, 4000);

            // Дороги
            ctx.fillStyle = '#222';
            ctx.fillRect(-ROAD_W/2, -2000, ROAD_W, 4000);
            ctx.fillRect(-2000, -ROAD_W/2, 4000, ROAD_W);

            // Тротуары
            ctx.fillStyle = '#333';
            // Вертикальные
            ctx.fillRect(-ROAD_W/2 - SIDEWALK_W, -2000, SIDEWALK_W, 4000);
            ctx.fillRect(ROAD_W/2, -2000, SIDEWALK_W, 4000);
            // Горизонтальные
            ctx.fillRect(-2000, -ROAD_W/2 - SIDEWALK_W, 4000, SIDEWALK_W);
            ctx.fillRect(-2000, ROAD_W/2, 4000, SIDEWALK_W);

            // Зебры
            ctx.fillStyle = '#555';
            for(let i = -1; i <= 1; i+=2) {
                for(let j = -3; j <= 3; j++) {
                    ctx.fillRect(j*20 - 5, i*(ROAD_W/2 + 10), 10, 40); // гор
                    ctx.fillRect(i*(ROAD_W/2 + 10), j*20 - 5, 40, 10); // верт
                }
            }

            // Разметка
            ctx.strokeStyle = 'white';
            ctx.setLineDash([20, 20]);
            ctx.beginPath();
            ctx.moveTo(0, -2000); ctx.lineTo(0, 2000);
            ctx.moveTo(-2000, 0); ctx.lineTo(2000, 0);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        for(let i=0; i<30; i++) entities.push(new Pedestrian());

        function loop() {
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, width, height);

            ctx.translate(offset.x, offset.y);
            ctx.scale(scale, scale);

            drawMap();

            if(Math.random() < 0.03) entities.push(new Car(Math.floor(Math.random()*4)));

            entities.forEach(e => {
                e.update();
                e.draw();
            });

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
