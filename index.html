<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fixed Night City AI</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; }
        canvas { display: block; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: #eee; pointer-events: none; background: rgba(0,0,0,0.7); padding: 12px; border-radius: 10px; font-family: sans-serif; border: 1px solid #333; }
    </style>
</head>
<body>
    <div id="ui"><b>Night City Fix</b><br>Баги с кубами и наложением исправлены</div>
    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const GRID_SIZE = 400;
        const CAR_W = 20, CAR_L = 42;
        
        let width, height, scale = 0.8, camera = { x: 0, y: 0 };
        let cars = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function sRand(x, y) {
            const s = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
            return s - Math.floor(s);
        }

        class Car {
            constructor(c, r, lane) {
                this.c = c; this.r = r; this.lane = lane;
                this.color = `hsl(${sRand(c, r + lane) * 360}, 70%, 50%)`;
                this.speed = 2 + sRand(c, r) * 2;
                this.angle = [Math.PI/2, Math.PI, -Math.PI/2, 0][lane];
                this.braking = false;
                const off = 32;
                this.lx = [200-off, 400, 200+off, 0][lane];
                this.ly = [0, 200-off, 400, 200+off][lane];
            }

            getGX() { return this.c * GRID_SIZE + this.lx; }
            getGY() { return this.r * GRID_SIZE + this.ly; }

            update(all, phase) {
                let dMin = Infinity;
                const gx = this.getGX(), gy = this.getGY();

                all.forEach(o => {
                    if(o === this) return;
                    const dx = o.getGX() - gx, dy = o.getGY() - gy;
                    const d = Math.hypot(dx, dy);
                    const dot = (dx * Math.cos(this.angle) + (dy * Math.sin(this.angle))) / d;
                    // Дистанция коллизии
                    if(d < 120 && dot > 0.8) dMin = Math.min(dMin, d);
                });

                const distToC = [this.ly, 400-this.lx, 400-this.ly, this.lx][this.lane];
                const green = (this.lane % 2 === 0) ? (phase % 2 === 0) : (phase % 2 === 1);
                const stop = distToC > 115 && distToC < 145 && !green;

                if(dMin < 55 || stop) {
                    this.braking = true;
                    this.speed = Math.max(0, this.speed - 0.5);
                } else if(dMin < 110) {
                    this.speed = Math.max(1, this.speed - 0.2);
                } else {
                    this.braking = false;
                    this.speed = Math.min(4, this.speed + 0.1);
                }

                this.lx += Math.cos(this.angle) * this.speed;
                this.ly += Math.sin(this.angle) * this.speed;

                if(this.lx >= GRID_SIZE) { this.lx = 0; this.c++; }
                if(this.lx < 0) { this.lx = GRID_SIZE; this.c--; }
                if(this.ly >= GRID_SIZE) { this.ly = 0; this.r++; }
                if(this.ly < 0) { this.ly = GRID_SIZE; this.r--; }
            }

            draw() {
                const sx = (this.getGX() - camera.x) * scale;
                const sy = (this.getGY() - camera.y) * scale;
                if (sx < -50 || sx > width + 50 || sy < -50 || sy > height + 50) return;

                ctx.save();
                ctx.translate(sx, sy);
                ctx.rotate(this.angle);
                // Фары
                const g = ctx.createLinearGradient(10*scale,0,70*scale,0);
                g.addColorStop(0,'rgba(255,255,200,0.2)'); g.addColorStop(1,'transparent');
                ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(5*scale,-5*scale); ctx.lineTo(70*scale,-25*scale); ctx.lineTo(70*scale,25*scale); ctx.lineTo(5*scale,5*scale); ctx.fill();
                // Кузов
                ctx.fillStyle = this.color;
                ctx.fillRect(-CAR_L/2*scale, -CAR_W/2*scale, CAR_L*scale, CAR_W*scale);
                if(this.braking) { ctx.fillStyle='#f00'; ctx.fillRect(-CAR_L/2*scale, -CAR_W/2*scale, 2*scale, CAR_W*scale); }
                ctx.restore();
            }
        }

        function loop() {
            ctx.fillStyle = '#070707';
            ctx.fillRect(0, 0, width, height);

            const phase = Math.floor(Date.now() / 4000) % 4;
            const sc = Math.floor(camera.x / GRID_SIZE) - 1;
            const ec = Math.ceil((camera.x + width/scale) / GRID_SIZE) + 1;
            const sr = Math.floor(camera.y / GRID_SIZE) - 1;
            const er = Math.ceil((camera.y + height/scale) / GRID_SIZE) + 1;

            // 1. СЛОЙ ДОРОГ
            ctx.fillStyle = '#111';
            for(let c=sc; c<=ec; c++) {
                for(let r=sr; r<=er; r++) {
                    const x = (c*GRID_SIZE-camera.x)*scale, y = (r*GRID_SIZE-camera.y)*scale, s = GRID_SIZE*scale;
                    ctx.fillRect(x + s*0.32, y, s*0.36, s);
                    ctx.fillRect(x, y + s*0.32, s, s*0.36);
                }
            }

            // 2. СЛОЙ ЗДАНИЙ (Теперь они не перекрывают дороги)
            ctx.fillStyle = '#0a0a0a';
            for(let c=sc; c<=ec; c++) {
                for(let r=sr; r<=er; r++) {
                    const x = (c*GRID_SIZE-camera.x)*scale, y = (r*GRID_SIZE-camera.y)*scale, s = GRID_SIZE*scale;
                    if(sRand(c, r) > 0.5) {
                        const bS = s*0.25;
                        ctx.fillRect(x+10*scale, y+10*scale, bS, bS);
                        ctx.fillRect(x+s-bS-10*scale, y+s-bS-10*scale, bS, bS);
                    }
                    // Спавн
                    const vis = c >= sc+1 && c < ec && r >= sr+1 && r < er;
                    if(!vis && Math.random() < 0.01 && cars.length < 100) cars.push(new Car(c, r, Math.floor(Math.random()*4)));
                }
            }

            // 3. СЛОЙ МАШИН
            cars.forEach(car => { car.update(cars, phase); car.draw(); });
            cars = cars.filter(c => Math.hypot(c.getGX()-(camera.x+width/scale/2), c.getGY()-(camera.y+height/scale/2)) < 2000);

            requestAnimationFrame(loop);
        }

        // Управление зумом и тачем
        canvas.onmousedown = e => { canvas.isD = true; canvas.lx = e.clientX; canvas.ly = e.clientY; };
        window.onmousemove = e => { if(canvas.isD) { camera.x -= (e.clientX-canvas.lx)/scale; camera.y -= (e.clientY-canvas.ly)/scale; canvas.lx = e.clientX; canvas.ly = e.clientY; }};
        window.onmouseup = () => canvas.isD = false;
        canvas.onwheel = e => {
            const os = scale; scale = Math.max(0.2, Math.min(2, scale - e.deltaY*0.001));
            camera.x += (e.clientX/os) - (e.clientX/scale); camera.y += (e.clientY/os) - (e.clientY/scale);
        };
        
        loop();
    </script>
</body>
</html>
